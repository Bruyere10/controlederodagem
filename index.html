<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Rodagem</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="header">
        <div class="header-logos">
            <img src="logo.png" class="logo logo-stellantis" alt="Stellantis">
            <img src="foto-sem-fundo.png" class="logo logo-zeentech" alt="Zeentech">
        </div>
    </header>

    <main class="main-container">
        <form id="form-apontamento">
            <div class="titulo-principal">
                <div class="titulo-icon">
                    <i class="bi bi-car-front"></i>
                </div>

                <div>
                    <h1>Controle de Rodagem Testing & Analysis</h1>
                    <p>Preencha as informações referentes à utilização do veículo e a rodagem realizada.</p>
                </div>
            </div>

            <div class="card">
                <div class="card-titulo">
                    <i class="bi bi-calendar-check"></i>
                    <h2>Dados da Rodagem</h2>
                </div>

                <div class="linha"></div>

                <div class="form-grid">
                    <div class="campo">
                        <label for="data">Data</label>
                        <div class="input-icon">
                            <i class="bi bi-calendar-event"></i>
                            <input type="date" id="data" required>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="tfm">TFM</label>
                        <div class="input-icon">
                            <i class="bi bi-hash"></i>
                            <input type="text" id="tfm" inputmode="numeric" pattern="[0-9]{6}" placeholder="Ex: 123456" required>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="motorista">Motorista</label>
                        <div class="input-icon">
                            <i class="bi bi-person"></i>
                            <select id="motorista" required>
                                <option value="">Selecione o motorista</option>
                                <option>Alexandre</option>
                                <option>Bryan</option>
                                <option>Gisele</option>
                                <option>Gustavo</option>
                                <option>Lydia</option>
                                <option>Vitor</option>
                                <option>José Alexis</option>
                                <option>Ilza</option>
                                <option>Richard</option>
                                <option>Rodrigo</option>
                            </select>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="turno">Turno da Rodagem</label>
                        <div class="input-icon">
                            <i class="bi bi-clock"></i>
                            <select id="turno" required>
                                <option value="">Selecione o turno</option>
                                <option>1º Turno</option>
                                <option>2º Turno</option>
                                <option>Horário Central</option>
                            </select>
                        </div>
                    </div>

                    <div class="campo campo-veiculo">
                        <label for="veiculo">Veículo</label>
                        <div class="input-icon">
                            <i class="bi bi-car-front"></i>
                            <select id="veiculo" required>
                                <option value="">Selecione o veículo</option>
                                <option>Argo - YH38791</option>
                                <option>Avenger - B520829</option>
                                <option>Scudo - Interno - A001623</option>
                                <option>Scudo - Misto - A007204</option>
                                <option>F1H - YCR0009</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!--ATIVIDADES E QUILOMETRAGEM-->

            <div class="card">
                <div class="card-titulo">
                    <i class="bi bi-speedometer2"></i>
                    <h2>Atividade e Quilometragem</h2>
                </div>

                <div class="linha"></div>

                <div class="form-grid">
                    <div class="campo">
                        <label for="horas-trabalhadas">Horas Trabalhadas</label>
                        <div class="input-icon">
                            <i class="bi bi-clock-history"></i>
                            <input type="text" id="horas-trabalhadas" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 8" required>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="prova">Prova</label>
                        <div class="input-icon">
                            <i class="bi bi-clipboard-check"></i>
                            <select id="prova" required>
                                <option value="">Selecione a prova</option>
                                <option>Amaciamento</option>
                                <option>Consumo de Óleo</option>
                                <option>Consumo de combustível</option>
                                <option>Translado SENAI</option>
                                <option>Translado Curvelo</option>
                                <option>Nápoli</option>
                                <option>RDE</option>
                                <option>DOOR TO DOOR</option>
                                <option>Outras Atividades</option>
                            </select>
                        </div>
                    </div>

                    <div class="campo campo-completo campo-outra-atividade" id="campo-outra-atividade">
                        <label for="outra-atividade">Atividade Realizada</label>
                        <div class="input-icon">
                            <i class="bi bi-list-task"></i>
                            <input type="text" id="outra-atividade" placeholder="Digite a atividade realizada">
                        </div>
                    </div>

                    <div class="campo campo-completo">
                        <label for="rota">Rota</label>
                        <div class="input-icon">
                            <i class="bi bi-signpost-2"></i>
                            <select id="rota" required>
                                <option value="">Selecione a rota</option>
                                <option>Rodovia</option>
                                <option>Urbano</option>
                                <option>Misto</option>
                                <option>Interno - Fábrica</option>
                                <option>Rodovia - Interno</option>
                                <option>Serra</option>
                            </select>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="km-inicial">Quilometragem Inicial</label>
                        <div class="input-icon">
                            <i class="bi bi-signpost-split"></i>
                            <input type="number" id="km-inicial" min="0" placeholder="Ex: 15230" required>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="km-final">Quilometragem Final</label>
                        <div class="input-icon">
                            <i class="bi bi-flag"></i>
                            <input type="number" id="km-final" min="0" placeholder="Ex: 15310" required>
                        </div>
                    </div>

                    <div class="campo campo-completo campo-resumo">
                        <label for="km-rodado">Quilometragem Rodada</label>
                        <div class="input-icon input-resumo">
                            <i class="bi bi-sign-turn-right"></i>
                            <input type="text" id="km-rodado" value="0 km" readonly>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ABASTECIMENTO E OBSERVAÇÕES -->

            <div class="card">
                <div class="card-titulo">
                    <i class="bi bi-fuel-pump"></i>
                    <h2>Abastecimento e Observações</h2>
                </div>

                <div class="linha"></div>

                <div class="form-grid">
                    <div class="campo">
                        <label for="combustivel">Combustível</label>
                        <div class="input-icon">
                            <i class="bi bi-droplet"></i>
                            <select id="combustivel">
                                <option value="">Não abasteceu</option>
                                <option>Gasolina</option>
                                <option>Etanol</option>
                                <option>Benzina</option>
                                <option>Diesel</option>
                            </select>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="litragem">Litragem Abastecida</label>
                        <div class="input-icon">
                            <i class="bi bi-123"></i>
                            <input type="number" id="litragem" min="0" step="0.01" placeholder="Preencha somente se abasteceu">
                        </div>
                    </div>

                    <div class="campo campo-completo">
                        <label for="observacoes">Observações sobre a Rodagem</label>
                        <div class="input-icon textarea-icon">
                            <i class="bi bi-chat-left-text"></i>
                            <textarea id="observacoes" rows="4" placeholder="Digite observações importantes sobre a rodagem"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="botoes">
                <button type="submit" class="btn-salvar">
                    <i class="bi bi-floppy"></i>
                    Salvar Apontamento
                </button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
